name: Sequential Jobs

on: push

jobs:

  
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    - run: echo "Building..."
    - run: npm install
  
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - run: echo "Testing..."
    - run: npm test
  
  deploy:
    runs-on: ubuntu-latest
    needs: [build, test]
    steps:
    - run: echo "Deploying..."
